<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>d10 Hub - Key System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f12;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #17171f;
            border: 1px solid #262633;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .subtitle {
            color: #71717a;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .key-box {
            background-color: #0f0f12;
            border: 1px solid #262633;
            border-radius: 8px;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            color: #f59e0b;
            letter-spacing: 1px;
            margin-bottom: 16px;
            word-break: break-all;
        }

        .btn-copy {
            background-color: #f59e0b;
            color: #000000;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-copy:hover {
            background-color: #d97706;
        }

        .footer-text {
            color: #71717a;
            font-size: 12px;
            margin-top: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">📁 d10 Hub</div>
        <p class="subtitle">Cole esta chave no jogo para liberar o script!</p>
        
        <!-- A chave aparece aqui direto -->
        <div class="key-box" id="key-display">Gerando Key...</div>
        
        <button class="btn-copy" onclick="copiarKey()">📋 Copiar Key</button>
        
        <p class="footer-text">Esta chave muda automaticamente a cada 24h.</p>
    </div>

    <script>
        // Sistema simplificado baseado apenas na data do calendário
        const data = new Date();
        const dia = String(data.getDate()).padStart(2, '0');
        const mes = String(data.getMonth() + 1).padStart(2, '0');
        const dataFormatada = dia + mes;

        // Chave estática diária idêntica à do script
        const chaveGerada = `d10_key_${dataFormatada}`;

        // Exibe direto na tela
        document.getElementById('key-display').innerText = chaveGerada;

        function copiarKey() {
            navigator.clipboard.writeText(chaveGerada).then(() => {
                const btn = document.querySelector('.btn-copy');
                btn.innerText = "✅ Copiado!";
                btn.style.backgroundColor = "#10b981";
                btn.style.color = "#ffffff";
                
                setTimeout(() => {
                    btn.innerText = "📋 Copiar Key";
                    btn.style.backgroundColor = "#f59e0b";
                    btn.style.color = "#000000";
                }, 2000);
            });
        }
    </script>

</body>
</html>
