<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>d10 Hub - Key System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f0f12;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #17171f;
            border: 1px solid #262633;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .subtitle {
            color: #71717a;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .key-box {
            background-color: #0f0f12;
            border: 1px solid #262633;
            border-radius: 8px;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            color: #f59e0b; /* Cor laranja idêntica à foto */
            letter-spacing: 1px;
            margin-bottom: 16px;
            word-break: break-all;
        }

        .btn-copy {
            background-color: #f59e0b;
            color: #000000;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-copy:hover {
            background-color: #d97706;
        }

        .footer-text {
            color: #ef4444;
            font-size: 12px;
            margin-top: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">📁 d10 Hub</div>
        <p class="subtitle">Cole esta chave no jogo para liberar o script!</p>
        
        <!-- Onde a chave vai aparecer -->
        <div class="key-box" id="key-display">Buscando ID...</div>
        
        <!-- Botão de copiar -->
        <button class="btn-copy" onclick="copiarKey()">📋 Copiar Key</button>
        
        <p class="footer-text" id="status-text">Esta chave expira em 24h.</p>
    </div>

    <script>
        // Pega o ?userid= que o Linkvertise envia na URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userid');
        let chaveGerada = "";

        if (userId) {
            // Pega a data atual (Dia e Mês)
            const data = new Date();
            const dia = String(data.getDate()).padStart(2, '0');
            const mes = String(data.getMonth() + 1).padStart(2, '0');
            const dataFormatada = dia + mes;

            // Faz o mesmo cálculo matemático que o script do Roblox faz
            const contaSecreta = (parseInt(userId) * 2) + 500;
            chaveGerada = `d10_${contaSecreta}_${dataFormatada}`;

            // Mostra a chave na tela
            document.getElementById('key-display').innerText = chaveGerada;
        } else {
            document.getElementById('key-display').innerText = "Erro: Sem ID!";
            document.getElementById('key-display').style.color = "#ef4444";
            document.getElementById('status-text').innerText = "Execute o script dentro do Roblox para gerar o link correto.";
        }

        // Função do botão de copiar
        function copiarKey() {
            if (chaveGerada) {
                navigator.clipboard.writeText(chaveGerada).then(() => {
                    const btn = document.querySelector('.btn-copy');
                    btn.innerText = "✅ Copiado!";
                    btn.style.backgroundColor = "#10b981";
                    btn.style.color = "#ffffff";
                    
                    setTimeout(() => {
                        btn.innerText = "📋 Copiar Key";
                        btn.style.backgroundColor = "#f59e0b";
                        btn.style.color = "#000000";
                    }, 2000);
                });
            }
        }
    </script>

</body>
</html>
